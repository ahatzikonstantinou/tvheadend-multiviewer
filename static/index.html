<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>TV Mosaic Settings</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <!-- <link rel="stylesheet" href="/static/css/common.css"> -->
</head>
<body>
  <header class="main-header"> 
    <div class="left-controls">
      <h1>TV Mosaic Settings</h1>
    </div>
    <button id="goToChannels" class="cog-btn">📺</button> 
  </header>
  
  <div>
    <label><strong>TVHeadend URLs (for domain sharing, 6 streams per url):</strong></label>
    <!-- Εδώ θα προστίθενται δυναμικά τα URLs -->
    <div id="url-container" style="margin-top: 5px; margin-bottom: 10px;"></div>
    
    <button type="button" id="btn-add-url" style="margin-bottom: 15px;">+ Add URL</button>

    <br>
    
    <label>
      Username:
      <input type="text" id="tvh-username" size="20" placeholder="admin">
    </label>

    <br>

    <label>
      Password:
      <input type="password" id="tvh-password" size="20" placeholder="••••••">
    </label>

    <br>

    <button id="btn-load-channels">Load channels</button>
    <span id="channels-status"></span>

    <br>

    <strong>Flask / go2rtc Backend</strong>
    <div>
      <label>go2rtc relative full path (e.g. go2rtc_linux_arm64)
        <input type="text" id="go2rtc-path" size="40" placeholder="go2rtc_linux_arm64">
      </label>
    </div>
    <div>
      <label>Url:
        <input type="text" id="go2rtc-url" size="40" placeholder="http://192.168.3.104:1984/api/webrtc">
      </label>
      <button id="btn-test-go2rtc">Test go2rtc</button>
    </div>    
    <span id="go2rtc-status" style="margin-left: 10px; font-weight: bold;"></span>

    <br>

    <button id="btn-save">Save settings</button>
    <span id="save-status"></span>
  </div>

  <h2>Grids</h2>

  <table id="gridTable" border="1" cellspacing="0" cellpadding="6">
    <thead>
      <tr>
        <th data-sort="name">Name</th>
        <th data-sort="rows">Rows</th>
        <th data-sort="cols">Cols</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  
  <h3>Create / Edit Grid</h3>

  <input type="hidden" id="grid-uuid">

  <label>
    Grid name:
    <input type="text" id="grid-name">
  </label>

  <label>
    Rows:
    <input type="number" id="grid-rows" min="1" max="10">
  </label>

  <label>
    Cols:
    <input type="number" id="grid-cols" min="1" max="10">
  </label>

  <button id="btn-new-grid">New Grid</button>

  <br>

  <div id="grid-container"></div>

  <button id="btn-save-grid">Save Grid</button>
  <hr>

  <script>
      document.getElementById('btn-test-go2rtc').addEventListener('click', async () => {
          const baseUrl = document.getElementById('go2rtc-url').value.trim();
          const statusSpan = document.getElementById('go2rtc-status');
          
          if (!baseUrl) {
              statusSpan.textContent = "❌ Παρακαλώ εισάγετε URL";
              statusSpan.style.color = "red";
              return;
          }

          statusSpan.textContent = "⏳ Έλεγχος σύνδεσης...";
          statusSpan.style.color = "orange";

          try {
              // Στέλνουμε ένα POST αίτημα στο test endpoint της Flask
              const response = await fetch(`/api/stream/test_connection?go2rtc_url=${encodeURIComponent(baseUrl)}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'text/plain' },
                  body: 'ping'
              });

              if (response.ok) {
                  statusSpan.textContent = "✅ Επιτυχής σύνδεση με Flask & go2rtc!";
                  statusSpan.style.color = "green";
              } else {
                  const errorData = await response.json().catch(() => ({}));
                  statusSpan.textContent = `❌ Σφάλμα: ${errorData.error || "Το go2rtc δεν εκτελείται"}`;
                  statusSpan.style.color = "red";
              }
          } catch (error) {
              console.error("go2rtc Test Error:", error);
              statusSpan.textContent = "❌ Αποτυχία σύνδεσης (Το Flask Backend είναι κλειστό)";
              statusSpan.style.color = "red";
          }
      });
      
    // Αρχικοποίηση των στοιχείων του DOM
    const urlContainer = document.getElementById('url-container');
    const btnAddUrl = document.getElementById('btn-add-url');

    // Συνάρτηση που δημιουργεί μια νέα γραμμή URL με το κουμπί Test και Delete
    function createUrlRow(value = '') {
      const row = document.createElement('div');
      row.style.marginBottom = '8px';
      row.className = 'url-row';

      row.innerHTML = `
        <input type="text" class="tvh-url-input" size="40" placeholder="http://192.168.3.104:9981" value="${value}">
        <button type="button" class="btn-test-single">Test</button>
        <button type="button" class="btn-delete-url" style="color: red;">X</button>
        <span class="test-result-single" style="margin-left: 10px; font-weight: bold;"></span>
      `;

      // Λειτουργία του κουμπιού Test για το συγκεκριμένο URL
      row.querySelector('.btn-test-single').addEventListener('click', async function() {
        const input = row.querySelector('.tvh-url-input');
        const resultSpan = row.querySelector('.test-result-single');
        const url = input.value.trim().replace(/\/$/, '');
        
        if (!url) {
          resultSpan.textContent = '❌ Empty URL';
          resultSpan.style.color = 'orange';
          return;
        }

        resultSpan.textContent = '⏳ Testing...';
        resultSpan.style.color = 'gray';

        // Χρήση των credentials αν υπάρχουν
        const username = document.getElementById('tvh-username').value.trim();
        const password = document.getElementById('tvh-password').value.trim();
        
        let fetchOptions = {};
        if (username && password) {
          const headers = new Headers();
          headers.set('Authorization', 'Basic ' + btoa(username + ":" + password));
          fetchOptions.headers = headers;
        }

        try {
          // Δοκιμάζουμε να καλέσουμε το επίσημο API του Tvheadend για να δούμε αν απαντάει
          const response = await fetch(`${url}/api/status/inputs`, fetchOptions);
          if (response.ok) {
            resultSpan.textContent = '✅ Connected!';
            resultSpan.style.color = 'green';
          } else {
            resultSpan.textContent = `❌ Error: ${response.status}`;
            resultSpan.style.color = 'red';
          }
        } catch (error) {
          resultSpan.textContent = '❌ Failed to reach host';
          resultSpan.style.color = 'red';
        }
      });

      // Λειτουργία του κουμπιού διαγραφής (X)
      row.querySelector('.btn-delete-url').addEventListener('click', function() {
        // Κρατάμε τουλάχιστον ένα πεδίο πάντα ανοιχτό
        if (urlContainer.querySelectorAll('.url-row').length > 1) {
          row.remove();
        } else {
          row.querySelector('.tvh-url-input').value = '';
          row.querySelector('.test-result-single').textContent = '';
        }
      });

      urlContainer.appendChild(row);
    }

    // Event listener για την προσθήκη νέου URL
    btnAddUrl.addEventListener('click', () => createUrlRow());

    // --- ΠΩΣ ΝΑ ΑΠΟΘΗΚΕΥΣΕΤΕ ΚΑΙ ΝΑ ΦΟΡΤΩΣΕΤΕ ΤΑ URLS ---

    // 1. Κατά την αποθήκευση (Στο δικό σας btn-save event listener)
    // Αντί για ένα URL, μαζεύουμε όλα τα URL σε ένα Array:
    function getSavedUrlsArray() {
      const inputs = urlContainer.querySelectorAll('.tvh-url-input');
      const urls = [];
      inputs.forEach(input => {
        if (input.value.trim()) urls.push(input.value.trim());
      });
      return urls; // Αυτό το array αποθηκεύετε στο config σας (π.χ. cfg.tvheadend_urls)
    }

    // 2. Κατά τη φόρτωση της σελίδας (Στο δικό σας load/init function)
    // Αντικαταστήστε τον τρόπο που εμφανίζονται τα δεδομένα στην εκκίνηση:
    function loadUrlsIntoUI(urlsArray) {
      urlContainer.innerHTML = ''; // Καθαρισμός
      if (!urlsArray || urlsArray.length === 0) {
        createUrlRow(''); // Αν δεν υπάρχει τίποτα αποθηκευμένο, δείξε ένα κενό πεδίο
      } else {
        urlsArray.forEach(url => createUrlRow(url)); // Δημιούργησε μια γραμμή για κάθε URL
      }
    }

    let channels = [];
    let cells = []; // {row, col, channel_uuid}

    document.getElementById("goToChannels").addEventListener("click", () => {
      window.location.href = "/grid2";
    });

    
    function renderGrid() {
      const rows = parseInt(document.getElementById('grid-rows').value, 10);
      const cols = parseInt(document.getElementById('grid-cols').value, 10);
      const container = document.getElementById('grid-container');
      container.innerHTML = '';

      for (let r = 0; r < rows; r++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'grid-row';
        for (let c = 0; c < cols; c++) {
          const cellDiv = document.createElement('div');
          cellDiv.className = 'grid-cell';

          const label = document.createElement('div');
          label.textContent = `Cell ${r},${c}`;
          cellDiv.appendChild(label);

          // Source type selector
          const typeSelect = document.createElement('select');
          typeSelect.className = 'source-type-select';
          typeSelect.dataset.row = r;
          typeSelect.dataset.col = c;
          
          const optNone = document.createElement('option');
          optNone.value = '';
          optNone.textContent = '-- none --';
          typeSelect.appendChild(optNone);
          
          const optTVH = document.createElement('option');
          optTVH.value = 'tvheadend';
          optTVH.textContent = 'TVHeadend Channel';
          typeSelect.appendChild(optTVH);
          
          const optRTSP = document.createElement('option');
          optRTSP.value = 'rtsp';
          optRTSP.textContent = 'RTSP URL';
          typeSelect.appendChild(optRTSP);

          // Channel selector (TVHeadend)
          const channelSelect = document.createElement('select');
          channelSelect.className = 'channel-select';
          channelSelect.dataset.row = r;
          channelSelect.dataset.col = c;
          channelSelect.style.display = 'none';

          const optEmpty = document.createElement('option');
          optEmpty.value = '';
          optEmpty.textContent = '-- none --';
          channelSelect.appendChild(optEmpty);

          channels.forEach(ch => {
            const opt = document.createElement('option');
            opt.value = ch.uuid;
            opt.textContent = `${ch.number || ''} ${ch.name}`;
            channelSelect.appendChild(opt);
          });

          // RTSP URL input
          const rtspInput = document.createElement('input');
          rtspInput.type = 'text';
          rtspInput.className = 'rtsp-url-input';
          rtspInput.placeholder = 'rtsp://user:pass@host:554/path';
          rtspInput.dataset.row = r;
          rtspInput.dataset.col = c;
          rtspInput.style.display = 'none';

          // Test RTSP button
          const testRtspBtn = document.createElement('button');
          testRtspBtn.textContent = 'Test';
          testRtspBtn.className = 'test-rtsp-btn';
          testRtspBtn.style.display = 'none';
          testRtspBtn.addEventListener('click', async () => {
            const url = rtspInput.value;
            testRtspBtn.textContent = 'Testing...';
            const res = await fetch('/api/test_rtsp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rtsp_url: url })
            });
            const j = await res.json();
            if (j.ok) {
              testRtspBtn.textContent = '✓ Test';
              testRtspBtn.style.color = 'green';
              setTimeout(() => {
                testRtspBtn.textContent = 'Test';
                testRtspBtn.style.color = '';
              }, 2000);
            } else {
              testRtspBtn.textContent = '✗ Error';
              testRtspBtn.style.color = 'red';
              setTimeout(() => {
                testRtspBtn.textContent = 'Test';
                testRtspBtn.style.color = '';
              }, 2000);
            }
          });

          // Load existing cell config
          const existing = cells.find(
            ce => ce.row === r && ce.col === c
          );
          
          if (existing) {
            const sourceType = existing.source_type || 'tvheadend'; // backward compat
            typeSelect.value = sourceType;

            if (sourceType === 'tvheadend' && existing.channel_uuid) {
              channelSelect.value = existing.channel_uuid;
              channelSelect.style.display = 'inline-block';
            } else if (sourceType === 'rtsp' && existing.rtsp_url) {
              rtspInput.value = existing.rtsp_url;
              rtspInput.style.display = 'inline-block';
              testRtspBtn.style.display = 'inline-block';
            }
          }

          // Type selector change handler
          typeSelect.addEventListener('change', () => {
            const sourceType = typeSelect.value;
            const row = parseInt(typeSelect.dataset.row, 10);
            const col = parseInt(typeSelect.dataset.col, 10);

            // Show/hide inputs
            if (sourceType === 'tvheadend') {
              channelSelect.style.display = 'inline-block';
              rtspInput.style.display = 'none';
              testRtspBtn.style.display = 'none';
            } else if (sourceType === 'rtsp') {
              channelSelect.style.display = 'none';
              rtspInput.style.display = 'inline-block';
              testRtspBtn.style.display = 'inline-block';
            } else {
              channelSelect.style.display = 'none';
              rtspInput.style.display = 'none';
              testRtspBtn.style.display = 'none';
            }

            // Update cells array
            const idx = cells.findIndex(ce => ce.row === row && ce.col === col);
            if (sourceType === '') {
              // Remove cell
              if (idx >= 0) {
                cells.splice(idx, 1);
              }
            } else {
              if (idx >= 0) {
                cells[idx].source_type = sourceType;
              } else {
                cells.push({ row, col, source_type: sourceType });
              }
            }
          });

          // Channel select change handler
          channelSelect.addEventListener('change', () => {
            const row = parseInt(channelSelect.dataset.row, 10);
            const col = parseInt(channelSelect.dataset.col, 10);
            const uuid = channelSelect.value || null;
            const idx = cells.findIndex(ce => ce.row === row && ce.col === col);
            if (idx >= 0) {
              cells[idx].channel_uuid = uuid;
            }
          });

          // RTSP input change handler
          rtspInput.addEventListener('change', () => {
            const row = parseInt(rtspInput.dataset.row, 10);
            const col = parseInt(rtspInput.dataset.col, 10);
            const url = rtspInput.value || null;
            const idx = cells.findIndex(ce => ce.row === row && ce.col === col);
            if (idx >= 0) {
              cells[idx].rtsp_url = url;
            }
          });

          cellDiv.appendChild(typeSelect);
          cellDiv.appendChild(channelSelect);
          cellDiv.appendChild(rtspInput);
          cellDiv.appendChild(testRtspBtn);
          rowDiv.appendChild(cellDiv);
        }
        container.appendChild(rowDiv);
      }
    }

    document.getElementById('grid-rows').addEventListener('change', renderGrid);
    document.getElementById('grid-cols').addEventListener('change', renderGrid);    

    async function loadChannels(){
      // const url = document.getElementById('tvh-url').value;
      const inputs = Array.from(document.querySelectorAll('.tvh-url-input'))
                      .map(i => i.value.trim())
                      .filter(v => v !== '');
      const url = inputs.length > 0 ? inputs[0] : '';

      const username = document.getElementById('tvh-username').value; 
      const password = document.getElementById('tvh-password').value;
      const status = document.getElementById('channels-status');
      console.log('Mainurl, username, password:', url, username, password);
      if (!url) {
        status.textContent = 'Error: Please enter at least one TVHeadend URL';
        status.style.color = 'orange';
        return;
      }

      status.textContent = 'Loading...';
      try {
        const res = await fetch('/api/channels', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tvheadend_url: url, tvh_username: username, tvh_password: password })
        });
        const j = await res.json();
        if (j.ok) {
          channels = j.channels;
          status.textContent = `Loaded ${channels.length} channels`;
          renderGrid();
        } else {
          status.textContent = 'Error: ' + (j.error || 'unknown');
          status.style.color = 'red'
        }
      } catch (error) {
        status.textContent = 'Network error fetching channels';
        status.style.color = 'red';
      }
    }
    document.getElementById('btn-load-channels').addEventListener('click',loadChannels);

    document.getElementById('btn-save').addEventListener('click', saveAllSettings);    

    // loadSettings();

    let grids = [];   // full grid objects

    // -----------------------------
    // Load all settings including grids
    // -----------------------------
    async function loadSettings() {
      const res = await fetch('/api/settings');
      const cfg = await res.json();

      console.log("cfg:", cfg);

      // 1. Διαχείριση των URLs (Υποστήριξη Array και Fallback για παλιό String)
      let urlsArray = [];
      if (Array.isArray(cfg.tvheadend_urls)) {
        urlsArray = cfg.tvheadend_urls;
      } else if (cfg.tvheadend_url) {
        // Αν υπάρχει το παλιό μονό URL ως string, το βάζουμε μέσα σε array
        urlsArray = [cfg.tvheadend_url];
      }
      
      // Γεμίζουμε δυναμικά τα νέα πεδία εισαγωγής στο UI
      loadUrlsIntoUI(urlsArray);

      // document.getElementById('tvh-url').value = cfg.tvheadend_url || '';
      document.getElementById("go2rtc-path").value = cfg.go2rtc_path || "";
      document.getElementById("go2rtc-url").value = cfg.go2rtc_url || "";

      document.getElementById("tvh-username").value = cfg.tvh_username || ""; 
      document.getElementById("tvh-password").value = cfg.tvh_password || "";

      grids = cfg.grids || [];
      renderGridTable();
    }

    // -----------------------------
    // Render sortable grid table
    // -----------------------------
    function renderGridTable(sortKey = "name", asc = true) {
      const tbody = document.querySelector("#gridTable tbody");
      tbody.innerHTML = "";

      const sorted = [...grids].sort((a, b) => {
        if (a[sortKey] < b[sortKey]) return asc ? -1 : 1;
        if (a[sortKey] > b[sortKey]) return asc ? 1 : -1;
        return 0;
      });

      sorted.forEach(grid => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${grid.name}</td>
          <td>${grid.rows}</td>
          <td>${grid.cols}</td>
          <td>
            <button data-uuid="${grid.uuid}" class="edit-btn">Edit</button>
            <button data-uuid="${grid.uuid}" class="delete-btn">Delete</button>
          </td>
        `;

        tbody.appendChild(tr);
      });

      document.querySelectorAll(".edit-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          loadGridIntoForm(btn.dataset.uuid);
        });
      });
    }

    // -----------------------------
    // Load grid into form for editing
    // -----------------------------
    function loadGridIntoForm(uuid) {
      const g = grids.find(x => x.uuid === uuid);
      if (!g) return;

      document.getElementById("grid-uuid").value = g.uuid;
      document.getElementById("grid-name").value = g.name;
      document.getElementById("grid-rows").value = g.rows;
      document.getElementById("grid-cols").value = g.cols;

      cells = g.cells || [];
      renderGrid();
    }

    // -----------------------------
    // Create new grid (clear form)
    // -----------------------------
    document.getElementById("btn-new-grid").addEventListener("click", () => {
      document.getElementById("grid-uuid").value = "";
      document.getElementById("grid-name").value = "";
      document.getElementById("grid-rows").value = 3;
      document.getElementById("grid-cols").value = 4;
      cells = [];
      renderGrid();
    });

    // -----------------------------
    // Save grid (create or update)
    // -----------------------------
    document.getElementById("btn-save-grid").addEventListener("click", async () => {
      const uuid = document.getElementById("grid-uuid").value;
      const name = document.getElementById("grid-name").value.trim();
      const rows = parseInt(document.getElementById("grid-rows").value);
      const cols = parseInt(document.getElementById("grid-cols").value);

      if (!name) {
        alert("Grid name required");
        return;
      }

      // enforce unique name
      if (grids.some(g => g.name === name && g.uuid !== uuid)) {
        alert("Grid name must be unique");
        return;
      }

      let grid;

      if (uuid) {
        // update existing
        grid = grids.find(g => g.uuid === uuid);
        grid.name = name;
        grid.rows = rows;
        grid.cols = cols;
        grid.cells = cells;
      } else {
        // create new
        grid = {
          uuid,
          name,
          rows,
          cols,
          cells
        };
        grids.push(grid);
      }

      await saveAllSettings();
      renderGridTable();
    });

    // -----------------------------
    // Delete grid
    // -----------------------------
    document.querySelector("#gridTable").addEventListener("click", async (e) => {
      if (!e.target.classList.contains("delete-btn")) return;

      const uuid = e.target.dataset.uuid;
      console.log("Deleting " + uuid);

      if (!confirm("Delete this grid?")) return;

      grids = grids.filter(g => g.uuid !== uuid);
      await saveAllSettings();
      renderGridTable();

      const current = document.getElementById("grid-uuid").value;
      if (current === uuid) {
        document.getElementById("btn-new-grid").click();
      }
    });


    // -----------------------------
    // Save everything to backend
    // -----------------------------
    async function saveAllSettings() {
      const status = document.getElementById('save-status');
      status.textContent = 'Saving...';

      const urlsArray = getSavedUrlsArray();

      const body = {
        // tvheadend_url: document.getElementById('tvh-url').value,
        tvheadend_urls: urlsArray,
        tvheadend_url: urlsArray.length > 0 ? urlsArray[0] : '',
        tvh_username: document.getElementById("tvh-username").value.trim(),
        tvh_password: document.getElementById("tvh-password").value.trim(),
        go2rtc_path: document.getElementById('go2rtc-path').value.trim(),
        go2rtc_url: document.getElementById('go2rtc-url').value.trim(),
        grids: grids
      };

      try {
        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const j = await res.json();
        if (j.status === 'ok') {
          status.textContent = 'Saved';
        } else {
          status.textContent = 'Error saving';
        }
      } catch (error) {
        status.textContent = 'Network error saving';
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadSettings();
      await loadChannels();
    });


  </script>
</body>
</html>
