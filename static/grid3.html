<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Mosaic Grid 3</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1f1f1f;
      border-bottom: 1px solid #333;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    select,
    input[type="range"] {
      font-size: 0.95rem;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
    }
    #streamWrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: calc(100vh - 80px);
      padding: 16px;
      box-sizing: border-box;
    }
    video {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      background: black;
      border: 1px solid #333;
      border-radius: 8px;
      object-fit: contain;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #eee;
      font-size: 0.95rem;
    }
    .info-row label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-row span {
      min-width: 60px;
      text-align: right;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header>
    <h1>TV Mosaic Grid 3</h1>
    <div class="controls">
      <label>
        Grid:
        <select id="gridSelector"><option value="">Loading...</option></select>
      </label>
      <label>
        Volume:
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1">
      </label>
      <span id="volumeValue">100%</span>
    </div>
  </header>

  <main id="streamWrapper">
    <video id="gridVideo" muted autoplay playsinline></video>
  </main>

  <script>
    const selector = document.getElementById('gridSelector');
    const video = document.getElementById('gridVideo');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');

    function setVolume(val) {
      video.volume = val;
      volumeValue.textContent = Math.round(val * 100) + '%';
      localStorage.setItem('grid3Volume', val);
    }

    function resizeVideo() {
      video.style.width = '100%';
      video.style.height = 'auto';
    }

    window.addEventListener('resize', resizeVideo);

    async function loadGrids() {
      const res = await fetch('/api/settings');
      const cfg = await res.json();
      const grids = cfg.grids || [];
      selector.innerHTML = '<option value="">Select grid</option>';
      grids.forEach(grid => {
        const opt = document.createElement('option');
        opt.value = grid.uuid;
        opt.textContent = grid.name || grid.uuid;
        selector.appendChild(opt);
      });

      const saved = localStorage.getItem('grid3SelectedGrid');
      if (saved && grids.some(g => g.uuid === saved)) {
        selector.value = saved;
        await loadSelection(saved);
      }
    }

    async function loadSelection(uuid) {
      if (!uuid) {
        video.removeAttribute('src');
        video.load();
        return;
      }

      localStorage.setItem('grid3SelectedGrid', uuid);
      const streamUrl = `/stream/grid/${encodeURIComponent(uuid)}/stream.mp4`;
      video.src = streamUrl;
      video.load();
      try {
        await video.play();
      } catch (e) {
        console.warn('Autoplay blocked, user interaction required');
      }
    }

    selector.addEventListener('change', async () => {
      await loadSelection(selector.value);
    });

    volumeSlider.addEventListener('input', () => {
      setVolume(parseFloat(volumeSlider.value));
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const savedVolume = localStorage.getItem('grid3Volume');
      const initial = savedVolume !== null ? parseFloat(savedVolume) : 1.0;
      volumeSlider.value = initial;
      setVolume(initial);
      await loadGrids();
      resizeVideo();
    });
  </script>
</body>
</html>
